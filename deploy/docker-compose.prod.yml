services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    environment:
      DATABASE_URL: postgresql://snaplify:${POSTGRES_PASSWORD}@postgres:5432/snaplify
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET}
      ORIGIN: ${ORIGIN}
      PORT: '3000'
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      INSTANCE_DOMAIN: ${INSTANCE_DOMAIN}
      INSTANCE_NAME: ${INSTANCE_NAME}
      INSTANCE_DESCRIPTION: ${INSTANCE_DESCRIPTION}
      FEATURE_ADMIN: ${FEATURE_ADMIN:-false}
      FEATURE_FEDERATION: ${FEATURE_FEDERATION:-false}
      FEATURE_COMMUNITIES: ${FEATURE_COMMUNITIES:-true}
      FEATURE_DOCS: ${FEATURE_DOCS:-true}
      FEATURE_LEARNING: ${FEATURE_LEARNING:-true}
      FEATURE_EXPLAINERS: ${FEATURE_EXPLAINERS:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - snaplify-net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: snaplify
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: snaplify
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U snaplify']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - snaplify-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - snaplify-net

  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7700/health']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - snaplify-net

networks:
  snaplify-net:

volumes:
  postgres_data:
  redis_data:
  meili_data:
